name: PR Checks

on:
  pull_request:
    branches: [master, develop, qa]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        continue-on-error: false

      - name: Run tests
        run: npm run test -- --no-watch --no-progress --browsers=ChromeHeadless --code-coverage

      - name: Build application
        run: npm run build

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

      - name: Comment PR with test results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |

            const fs = require('fs');

            const coverageDir = 'coverage';
            if (fs.existsSync(coverageDir)) {
              const prNumber = context.payload.pull_request ? context.payload.pull_request.number : null;
              if (prNumber) {
                github.rest.issues.createComment({
                  issue_number: prNumber,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: '✅ Tests completed successfully! Coverage report has been uploaded as an artifact.'
                });
              } else {
                console.log('No pull request context. Skipping comment.');
              }
            } else {
              console.log('No coverage directory found. Skipping comment.');
            }
